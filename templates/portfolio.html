{% extends 'base.html' %}
{% load static %}

{% block content %}

<header class="masthead" style="background-image: url('{% static "img/portfolio-bg.jpg" %}')">
  <div class="overlay"></div>

  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 mx-auto">
        <div class="site-heading">
          <h1>Portafolio</h1>
          <span class="subheading">Trabajos de ESTEFANIA CHINGA</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container mt-5">

  {% for project in projects %}

  <div class="row project mb-5">

    <div class="col-lg-3 col-md-4 offset-lg-1">
      <img class="img-fluid" src="{{ project.image.url }}" alt="">
    </div>

    <div class="col-lg-7 col-md-8">
      <h2 class="section-heading title">
        {{ project.title }}
      </h2>

      <p>
        {{ project.description }}
      </p>
    </div>

  </div>

  {% endfor %}

</div>

{% endblock %}
